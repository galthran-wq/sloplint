# Dogfoods the sloplint action on this repo. Points at corpus/slop (deliberately sloppy
# sample code) so the SARIF upload, PR comment, and badges all have content to render —
# with fail-on-findings disabled so the demo stays green.
name: sloplint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  sloplint:
    name: slop check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run sloplint
        uses: ./
        with:
          paths: corpus/slop
          preview: "true"
          comment: "true"
          upload-sarif: "true"
          badges-dir: ".sloplint-badges"
          fail-on-findings: "false"

name: Wheels

# Build PyPI wheels that bundle the sloplint binary (issue #47). On every PR/push we build a
# Linux wheel and smoke-test that it installs a working `sloplint`; on a `v*` tag we build the
# full platform matrix and publish to PyPI.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-14
            target: x86_64
          - os: macos-14
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          # manylinux build container so the Linux wheel is broadly compatible.
          manylinux: ${{ matrix.os == 'ubuntu-latest' && 'auto' || '' }}
          # Pin rustc to the Ruff-deps requirement; maturin-action installs this toolchain AND
          # the cross-compile target (e.g. x86_64-apple-darwin on the arm64 macOS runner),
          # inside the manylinux container for the Linux build.
          rust-toolchain: "1.94.0"

      - name: Smoke-test the wheel installs a working binary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv /tmp/v
          # Install only from the freshly-built wheel — no PyPI, no source build. The
          # distribution is `sloplintpy`; the installed command is `sloplint`.
          /tmp/v/bin/pip install --no-index --find-links dist sloplintpy
          /tmp/v/bin/sloplint --version
          printf 'def f():\n    # a banned comment\n    return 1\n' > /tmp/smoke.py
          # `check` exits non-zero on findings, so a clean exit here means it failed to flag.
          if /tmp/v/bin/sloplint check /tmp/smoke.py; then
            echo "FAIL: expected a finding (non-zero exit)" >&2
            exit 1
          fi
          echo "OK: wheel installs a working sloplint binary"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # Token auth via the PYPI_API_TOKEN repo secret (account-scoped — creates the project on
      # first publish). Swap to trusted publishing later by removing `password` + adding
      # `id-token: write`.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}

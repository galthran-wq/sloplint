# sloplint configuration. All keys are optional; the values below are the defaults.
#
# sloplint runs *after* Ruff in the same CI job and only checks what Ruff doesn't, so this
# file controls the slop-specific rules (SLPxxx) only.

# Code prefixes to enable. "SLP" enables every stable rule. These are PREFIXES, not exact
# codes: "SLP01" matches SLP010, SLP011, ... not just SLP01.
select = ["SLP"]

# Code prefixes to disable (wins over `select`). Same prefix semantics as `select`.
ignore = []

# Enable preview (unstable) rules. Off by default.
preview = false

# Near-duplicate (clone) detection — SLP020. Conservative by default (near-identical only).
[clone]
min_statements = 3    # ignore functions smaller than this (avoids flagging trivial getters)
similarity = 0.85     # Jaccard similarity at/above which two functions are called clones

# Size/shape limits for the structural rules.
[limits]
file_max_lines = 400       # SLP080: flag files longer than this
nesting_max_depth = 4      # SLP082: max control-flow nesting depth inside one function
data_nesting_max_depth = 3 # SLP084: max nesting depth of one data-structure literal (preview)
max_identifier_words = 4   # SLP060: flag identifiers with more words than this (preview)
dir_max_modules = 15       # SLP090: flag dirs with more .py modules than this

# Per-path overrides. All matching overrides apply; their `ignore` lists accumulate.
# Comments are banned by default; opt specific paths back in here.
#
# [[overrides]]
# path = "alembic/**"        # gitignore-style glob matched against the file path
# allow_comments = true      # migrations may carry explanatory comments
# ignore = ["SLP010"]        # and don't enforce the comment ban there
#
# [[overrides]]
# path = "tests/**"
# allow_comments = true

# For a single intentional case, prefer inline suppression over a path-wide override — acknowledge
# it at the site with Ruff's `# noqa` (line-level, exactly like Ruff):
#
#   def request(self, ...):   # noqa: SLP020  (sync/async mirror of AsyncClient.request)
#
# List several codes (`# noqa: SLP020, SLP082`), or use a bare `# noqa` for every rule on that line.
# The trailing reason is just a normal comment. SLP020 is on by default and a clone is reported at
# each end, so silencing a whole pair takes a `# noqa` at each end.
#
# Running next to Ruff: set `external = ["SLP"]` in your Ruff config so RUF100 doesn't flag
# `# noqa: SLP020` as unused.
